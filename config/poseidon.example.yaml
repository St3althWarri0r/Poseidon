# Poseidon configuration.
# Copy to ~/.config/poseidon/poseidon.yaml (or run: poseidon config example).
# SECRETS NEVER GO IN THIS FILE — fields named `credential` are the *names*
# of entries in the encrypted vault (poseidon vault set <name>).

# Operating mode:
#   research    Mode 1 — analysis only, no orders ever
#   approval    Mode 2 — Claude proposes, you approve on the dashboard
#   autonomous  Mode 3 — Claude executes within risk limits
mode: research

log_level: INFO

ai:
  model: claude-opus-4-8
  effort: high                # low | medium | high | xhigh | max
  review_interval_seconds: 300
  api_key_credential: anthropic_api_key
  # Cost metering (USD per million tokens; defaults match claude-opus-4-8)
  # and an optional hard monthly ceiling — review cycles pause at the cap.
  input_price_per_mtok: 5.0
  output_price_per_mtok: 25.0
  monthly_budget_usd: 0       # 0 = no ceiling
  # --- Reflection -> lesson-memory loop (advisory; never gates risk) ------
  # When a position closes, distill a short lesson (realized return + alpha vs
  # SPY) and re-inject the relevant recent lessons into future review cycles.
  # Lessons are advisory context only and are kept out of the tamper-evident
  # audit chain. Defaults give the closed loop; inject:false = write-only
  # ledger you can review; enabled:false turns it off.
  reflection:
    enabled: true             # write a lesson when a position closes
    inject: true              # feed relevant lessons into future cycle prompts
    max_injected: 8           # hard cap on lessons per cycle prompt
    per_symbol: 2             # newest lessons per relevant ticker
    global_n: 3               # newest lessons overall (cross-ticker)
    lookback_days: 120        # ignore lessons older than this
  # --- Model tiering (optional; cost/latency win on the Anthropic path) ---
  # Run the tolerant auxiliary roles (operator chat + reflection lessons) on a
  # cheaper/faster "utility" model while the trading decision and the algorithm
  # reviewer stay on `model` above. Same backend + endpoint, model swapped.
  # Unset = no tiering (every role uses the primary). On a local-only setup this
  # is near-zero value (a smaller local model is still free); the real payoff is
  # the Anthropic path (Haiku for the aux roles, Opus for the money decision).
  #   utility_model: claude-haiku-4-5-20251001   # or a smaller local model id
  # --- Advisory analyst firm -> debate packet (opt-in; upstream of the PM) -----
  # A background "research firm" (4 analysts -> bull/bear debate -> advisory risk
  # lens) precomputes an explainable packet per watchlist symbol on the utility
  # model and feeds the freshest one into review cycles. ADVISORY ONLY: it never
  # gates or places an order and stays out of the audit chain. OFF by default;
  # call-heavy, so keep max_symbols_per_sweep low on a local endpoint.
  analysis:
    enabled: false
    inject: true
    debate_rounds: 2
    risk_rounds: 1
    refresh_hours: 24
    max_injected: 3
    max_render_chars: 1200
    max_symbols_per_sweep: 8
  # --- Local model (no API credit) ---------------------------------------
  # Run the portfolio manager on a local OpenAI-compatible endpoint (e.g. LM
  # Studio) instead of the Anthropic API — free and unlimited, but weaker than
  # Opus: good for paper experimentation, not real money. Still needs a
  # real-time data provider (see the Alpaca IEX option below), because orders
  # require fresh quotes regardless of which model decides them.
  #   backend: openai_compatible
  #   base_url: http://localhost:1234/v1
  #   model: devstral-small-2-24b-instruct-2512
  #   temperature: 0.2
  #   input_price_per_mtok: 0     # local = free
  #   output_price_per_mtok: 0

data:
  real_time_max_age_seconds: 5
  delayed_max_age_seconds: 900
  allow_delayed_for_research: true   # delayed data OK for research; orders always require fresh quotes
  providers:
    # Priority: lower number = tried first. Failover is automatic.
    # Every provider below has a $0 tier — see docs/api-configuration.md
    # for exactly what each free tier includes and its rate limits.
    #
    # Public.com (FREE with a Public brokerage account): real-time quotes,
    # bars, and option chains with greeks — the same API secret as the
    # `public` broker. The best zero-cost primary source.
    # - name: public_data
    #   credential: public_api_secret
    #   priority: 10
    - name: finnhub              # free tier: real-time US quotes, news, earnings
      credential: finnhub_api_key
      priority: 20
    - name: twelvedata           # free tier: quotes + bars (8 req/min)
      credential: twelvedata_api_key
      priority: 30
    - name: alphavantage         # free tier: EOD quotes, news+sentiment (25 req/day)
      credential: alphavantage_api_key
      priority: 40
    # Optional extras:
    # Alpaca market data — free real-time IEX feed with any Alpaca account,
    # reusing the same `alpaca_keys` broker credential. The simplest way to get
    # quotes fresh enough to clear real_time_max_age_seconds for live trading
    # (the free finnhub/twelvedata/alphavantage tiers are too delayed for it).
    # Also the crypto source: enabling it advertises the `crypto` capability, so
    # spot BASE/USD pairs (e.g. BTC/USD) can be quoted 24/7 — needed for crypto
    # paper trading (see docs/api-configuration.md). No extra entitlement.
    # Credential is JSON: {"key_id": "...", "secret_key": "..."}
    # - name: alpaca
    #   credential: alpaca_keys
    #   priority: 15
    #   options: { feed: iex }
    # Tradier — free sandbox market data with a developer account.
    # - name: tradier_data
    #   credential: tradier_token
    #   priority: 25
    #   options: { sandbox: true }
    # Polygon — generous paid tiers; free tier is delayed (fine for research).
    # - name: polygon
    #   credential: polygon_api_key
    #   priority: 12

brokers:
  # Built-in paper broker — fills priced from live quotes; ideal first setup.
  # Supports equities (fractional) and spot crypto (BASE/USD, e.g. BTC/USD).
  # Crypto needs a crypto-capable data provider (enable `alpaca` data above)
  # and is paper-only for now; live crypto is a documented follow-on.
  - name: paper
    enabled: true
    primary: true
    options:
      starting_cash: 100000
  # Alpaca (credential JSON: {"key_id": "...", "secret_key": "..."})
  # - name: alpaca
  #   enabled: true
  #   primary: true
  #   paper: true
  #   credential: alpaca_keys
  # Tradier (credential JSON: {"access_token": "...", "account_id": "..."})
  # - name: tradier
  #   paper: true
  #   credential: tradier_creds
  # Public.com — free API access (stocks/ETFs/options/crypto, no commission
  # on stocks/ETFs). No paper environment: `paper: false` is required and
  # trades are LIVE. Credential JSON: {"secret": "...", "account_id": "..."}
  # (account_id optional). Same secret powers the public_data provider.
  # - name: public
  #   enabled: true
  #   primary: true
  #   paper: false
  #   credential: public_api_secret
  # tastytrade, schwab, ibkr: see docs/broker-setup.md

risk:
  max_position_pct: 0.10
  max_portfolio_exposure_pct: 1.0
  max_daily_loss_pct: 0.03
  max_weekly_loss_pct: 0.07
  max_drawdown_pct: 0.15
  max_leverage: 1.0
  max_options_exposure_pct: 0.20
  max_sector_concentration_pct: 0.30
  max_order_notional: 25000
  max_spread_pct: 0.02
  min_avg_volume: 100000
  max_orders_per_day: 40
  trade_cooldown_seconds: 300
  news_blackout_minutes_before_econ: 10
  volatility_halt_daily_move_pct: 0.08
  slippage_limit_pct: 0.01
  # Portfolio VaR halt (0 = off). When set, new risk requires fresh risk
  # metrics and is blocked while 1-day VaR(95) exceeds this % of equity.
  max_portfolio_var_pct: 0
  benchmark_symbol: SPY
  # Vol-targeted sizing: one typical day should move a position by this
  # fraction of equity (feeds the AI's suggest_position_size tool).
  position_risk_budget_pct: 0.005

# Position guardian: enforces each decision's stop-loss / take-profit against
# live quotes between review cycles (research: alert only; approval: proposes
# the exit for you to confirm; autonomous: executes it).
guardian:
  enabled: true
  interval_seconds: 60

# Scheduled reporting.
reports:
  daily_summary: true
  daily_summary_cron: "15 16 * * 1-5"   # 16:15 ET weekdays

watchlists:
  - name: core
    symbols: [SPY, QQQ, AAPL, MSFT, NVDA, AMZN, GOOGL, META]

strategies:
  - name: momentum
    enabled: true
  - name: mean_reversion
    enabled: true
  - name: etf_rotation
    enabled: false
    symbols: [XLK, XLF, XLV, XLE, XLI, XLY, XLP, XLU, XLB, XLRE, XLC]
  - name: covered_calls
    enabled: false
  - name: cash_secured_puts
    enabled: false
    symbols: [AAPL, MSFT]
  - name: wheel
    enabled: false
  - name: protective_puts
    enabled: true
  - name: volatility
    enabled: true
    symbols: [SPY]
  # also available: breakouts, swing, pairs, vertical_spreads, iron_condors,
  # long_term, dividend, growth

schedules:
  # A default review_cycle schedule (every ai.review_interval_seconds during
  # market hours) and a nightly audit verification are added automatically.
  - name: after-hours-review
    job: review_cycle
    cron: "30 17 * * 1-5"     # 17:30 ET weekdays — post-close review
  - name: morning-sync
    job: portfolio_sync
    cron: "0 9 * * 1-5"

notifications:
  - kind: desktop
    min_level: info
  # - kind: email
  #   min_level: warning
  #   credential: smtp_password        # vault JSON: {"password": "..."}
  #   options:
  #     host: smtp.example.com
  #     port: 587
  #     username: you@example.com
  #     from_addr: poseidon@example.com
  #     to_addr: you@example.com
  # - kind: discord
  #   min_level: info
  #   credential: discord_webhook      # vault JSON: {"webhook_url": "https://discord.com/api/webhooks/..."}
  # - kind: telegram
  #   min_level: warning
  #   credential: telegram_bot         # vault JSON: {"bot_token": "...", "chat_id": "..."}
  # - kind: webhook
  #   min_level: critical
  #   credential: ops_webhook          # vault JSON: {"url": "https://...", "token": "..."}

dashboard:
  host: 127.0.0.1
  port: 8321
  # Required if host is ever non-loopback: vault entry holding a bearer token
  # (open the dashboard as http://host:8321/?token=... ).
  # auth_token_credential: dashboard_token

updates:
  enabled: true
  check_interval_hours: 24
  # Self-update on launch: git pull --ff-only + pip install, then a restart
  # prompt. Restart-gated (never restarts the engine for you) and safe
  # (fast-forward only — a diverged checkout notifies instead of forcing).
  auto_apply: true

# Offline factor research (poseidon research factors). Pure analysis — never
# trades. Point-in-time IC/IR; give it a BROAD --symbols universe (hundreds of
# names), not just your watchlist, or the cross-sectional IC is noisy.
research:
  horizon: 5            # forward-return horizon (trading days) for the headline IC
  rebalance_every: 5    # evaluate every N days; keep >= horizon to avoid overlap inflation
  horizons: [1, 5, 10, 20]   # decay curve
  min_cross: 5          # minimum symbols per cross-section
  lookback_days: 400    # bars to load per symbol

# Strategy-decay watchdog. Watches each strategy's rolling realized edge and flags
# decay (healthy -> watch -> decaying -> retire_recommended). ADVISORY by default —
# it only flags/audits/notifies. It can only ever REDUCE trading, never place an
# order. auto_retire (opt-in) deactivates a decayed CUSTOM strategy (builtin = flag-only).
strategy_health:
  enabled: true
  auto_retire: false      # opt-in: auto-deactivate a decayed custom strategy
  window_trades: 20
  min_trades: 8           # below this the window is "insufficient" (never flagged decaying)
  baseline_min_trades: 20
  decay_t: 2.0            # t-stat threshold for a significantly-<=0 recent edge
  decay_streak: 2         # consecutive dying sweeps -> decaying
  retire_streak: 4        # consecutive dying sweeps -> retire_recommended
  recover_streak: 2       # consecutive ok sweeps to step back toward healthy
